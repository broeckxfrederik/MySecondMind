services:
  mysecondmind:
    build: .
    container_name: mysecondmind
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./vault:/app/vault
      - ./audio:/app/audio
      - ./ai-knowledge:/app/ai-knowledge
      - ./data:/app/data
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mysecondmind.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.mysecondmind.entrypoints=websecure"
      - "traefik.http.routers.mysecondmind.tls.certresolver=letsencrypt"
      - "traefik.http.services.mysecondmind.loadbalancer.server.port=8000"
      # Auth is handled globally by Traefik — no per-service middleware label needed.

networks:
  proxy:
    external: true
