services:
  mysecondmind:
    build: .
    container_name: mysecondmind
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./vault:/app/vault
      - ./audio:/app/audio
      - ./ai-knowledge:/app/ai-knowledge
      - ./data:/app/data
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mysecondmind.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.mysecondmind.entrypoints=websecure"
      - "traefik.http.routers.mysecondmind.tls.certresolver=letsencrypt"
      - "traefik.http.services.mysecondmind.loadbalancer.server.port=8000"
      # Auth is handled globally by Traefik — no per-service middleware label needed.

  syncthing:
    image: lscr.io/linuxserver/syncthing:latest
    container_name: syncthing
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-UTC}
    volumes:
      - ./syncthing-config:/config
      - ./vault:/vault
    ports:
      - "22000:22000/tcp"
      - "22000:22000/udp"
      - "21027:21027/udp"
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.syncthing.rule=Host(`${SYNCTHING_DOMAIN}`)"
      - "traefik.http.routers.syncthing.entrypoints=websecure"
      - "traefik.http.routers.syncthing.tls.certresolver=letsencrypt"
      - "traefik.http.services.syncthing.loadbalancer.server.port=8384"

networks:
  proxy:
    external: true
