<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MySecondMind</title>
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3350;
      --accent: #6c8ef7;
      --accent2: #a78bfa;
      --text: #e2e8f0;
      --text-dim: #8892a4;
      --link-color: #22d3ee;
      --note-color: #34d399;
      --concept-color: #f59e0b;
      --danger: #f87171;
      --radius: 8px;
      --font: 'Inter', system-ui, -apple-system, sans-serif;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; }

    .layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      grid-template-rows: 100vh;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow: hidden;
    }

    .sidebar-header {
      padding: 18px 16px 14px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-header h1 {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--accent);
    }

    .sidebar-header p { color: var(--text-dim); font-size: 12px; margin-top: 2px; }

    /* Ingest form */
    .ingest-form {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .ingest-form textarea,
    .ingest-form input[type="text"] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 13px;
      padding: 8px 10px;
      resize: vertical;
      font-family: var(--font);
      outline: none;
      transition: border-color 0.15s;
    }

    .ingest-form textarea:focus,
    .ingest-form input:focus { border-color: var(--accent); }

    .ingest-form textarea { min-height: 60px; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 14px;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { opacity: 0.9; }

    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .btn-ghost { background: var(--surface2); color: var(--text-dim); }
    .btn-ghost:hover { color: var(--text); background: var(--border); }

    .ingest-status { font-size: 12px; color: var(--text-dim); min-height: 16px; }
    .ingest-status.error { color: var(--danger); }
    .ingest-status.success { color: var(--note-color); }

    /* Notes list */
    .notes-header {
      padding: 10px 16px 6px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .notes-header span { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); }

    .notes-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 8px 12px;
    }

    .note-item {
      padding: 10px 10px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.1s;
      border: 1px solid transparent;
    }

    .note-item:hover { background: var(--surface2); }
    .note-item.active { background: var(--surface2); border-color: var(--accent); }

    .note-item-title { font-size: 13px; font-weight: 500; line-height: 1.3; }
    .note-item-meta { font-size: 11px; color: var(--text-dim); margin-top: 3px; display: flex; gap: 8px; align-items: center; }

    .tag {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
    }

    .tag-link { background: rgba(34, 211, 238, 0.15); color: var(--link-color); }
    .tag-note { background: rgba(52, 211, 153, 0.15); color: var(--note-color); }
    .tag-concept { background: rgba(245, 158, 11, 0.15); color: var(--concept-color); }

    /* ── Main area ── */
    .main {
      display: grid;
      grid-template-rows: 1fr 340px;
      overflow: hidden;
    }

    /* Graph */
    .graph-container {
      position: relative;
      overflow: hidden;
    }

    #graph-canvas {
      width: 100%;
      height: 100%;
    }

    .graph-toolbar {
      position: absolute;
      top: 12px;
      right: 12px;
      display: flex;
      gap: 6px;
    }

    .graph-legend {
      position: absolute;
      bottom: 12px;
      left: 12px;
      background: rgba(26,29,39,0.85);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 12px;
      display: flex;
      gap: 12px;
      font-size: 11px;
    }

    .legend-item { display: flex; align-items: center; gap: 5px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; }

    /* Note detail panel */
    .note-detail {
      border-top: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .note-detail-header {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .note-detail-title {
      font-size: 14px;
      font-weight: 600;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .note-detail-actions { display: flex; gap: 6px; }

    .note-detail-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      font-size: 13px;
      line-height: 1.6;
      color: var(--text-dim);
    }

    .note-detail-body.empty {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: var(--border);
    }

    /* Markdown-lite rendering */
    .md h1, .md h2, .md h3 { color: var(--text); margin: 12px 0 6px; }
    .md h1 { font-size: 16px; }
    .md h2 { font-size: 14px; }
    .md h3 { font-size: 13px; }
    .md p { margin-bottom: 8px; }
    .md a { color: var(--accent); text-decoration: none; }
    .md a:hover { text-decoration: underline; }
    .md code { background: var(--surface2); padding: 1px 5px; border-radius: 3px; font-size: 12px; font-family: monospace; }
    .md pre { background: var(--surface2); padding: 10px; border-radius: var(--radius); overflow-x: auto; margin-bottom: 8px; }
    .md ul, .md ol { margin-left: 20px; margin-bottom: 8px; }
    .md li { margin-bottom: 3px; }
    .md .wikilink { color: var(--accent2); cursor: pointer; text-decoration: none; }
    .md .wikilink:hover { text-decoration: underline; }
    .md blockquote { border-left: 3px solid var(--border); padding-left: 10px; color: var(--text-dim); margin-bottom: 8px; }

    /* Audio player */
    .audio-player {
      padding: 8px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface2);
      flex-shrink: 0;
    }

    .audio-player audio { flex: 1; height: 28px; }
    .audio-player .audio-label { font-size: 11px; color: var(--text-dim); white-space: nowrap; }

    /* Loading spinner */
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Scrollbars */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>
<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h1>⬡ MySecondMind</h1>
      <p>Your personal knowledge graph</p>
    </div>

    <!-- Ingest form -->
    <div class="ingest-form">
      <input type="text" id="ingest-url" placeholder="Paste a URL..." />
      <textarea id="ingest-text" placeholder="...or paste raw text / notes here"></textarea>
      <input type="text" id="ingest-title" placeholder="Optional title" />
      <button class="btn btn-primary" id="ingest-btn">
        <span id="ingest-btn-label">Add to Mind</span>
      </button>
      <div class="ingest-status" id="ingest-status"></div>
    </div>

    <!-- Notes list -->
    <div class="notes-header">
      <span id="notes-count">Notes</span>
      <button class="btn btn-ghost btn-sm" id="refresh-btn" title="Refresh notes">↻</button>
    </div>
    <div class="notes-list" id="notes-list">
      <div style="padding:20px;text-align:center;color:var(--text-dim)">Loading...</div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <!-- Graph -->
    <div class="graph-container">
      <div id="graph-canvas"></div>
      <div class="graph-toolbar">
        <button class="btn btn-ghost btn-sm" id="fit-btn" title="Fit to screen">⊞ Fit</button>
        <button class="btn btn-ghost btn-sm" id="rebuild-btn" title="Rebuild graph">⟳ Rebuild</button>
      </div>
      <div class="graph-legend">
        <div class="legend-item"><div class="legend-dot" style="background:#22d3ee"></div>Link</div>
        <div class="legend-item"><div class="legend-dot" style="background:#34d399"></div>Note</div>
        <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div>Concept</div>
      </div>
    </div>

    <!-- Note detail -->
    <div class="note-detail">
      <div class="note-detail-header">
        <div class="note-detail-title" id="detail-title">Select a note or click a graph node</div>
        <div class="note-detail-actions">
          <button class="btn btn-ghost btn-sm" id="open-vault-btn" style="display:none" title="Open in vault">Open file</button>
        </div>
      </div>
      <div class="note-detail-body empty md" id="detail-body">
        Click any node in the graph or a note in the sidebar to view its content.
      </div>
      <div class="audio-player" id="audio-player" style="display:none">
        <span class="audio-label">🔊 Listen</span>
        <audio id="audio-el" controls preload="none"></audio>
      </div>
    </div>
  </main>
</div>

<script src="app.js"></script>
</body>
</html>
